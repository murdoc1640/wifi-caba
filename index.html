<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFi Libre · CABA y Localidades</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg:#0a0e1a; --surface:#111827; --card:#1a2235; --border:#243050;
    --accent:#00e5ff; --text:#e2e8f0; --muted:#64748b;
    --caba:#00e5ff; --localidad:#a78bfa;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

  header{background:var(--surface);padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;z-index:1001;}
  .logo{font-weight:800;font-size:1.2rem;color:var(--accent);display:flex;align-items:center;gap:0.5rem;}
  .stats{font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--muted);background:rgba(0,0,0,0.2);padding:0.4rem 0.8rem;border-radius:20px;border:1px solid var(--border);}

  .main-container{display:flex;flex:1;overflow:hidden;}
  #map{flex:1;z-index:1;background:var(--bg);}

  .sidebar{width:380px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:1000;}
  .search-area{padding:1.5rem;border-bottom:1px solid var(--border);}
  
  .filters-container{display:flex;gap:0.5rem;overflow-x:auto;padding:10px 0;scrollbar-width:none;}
  .filters-container::-webkit-scrollbar{display:none;}
  
  .filter-btn{white-space:nowrap;padding:0.5rem 1rem;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:0.75rem;font-weight:600;cursor:pointer;transition:0.2s;}
  .filter-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}
  .filter-btn.loc-btn.active{background:var(--localidad);color:var(--bg);border-color:var(--localidad);}

  .results-list{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:0.8rem;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1rem;cursor:pointer;transition:0.2s;}
  .card:hover{border-color:var(--muted);}
  .card.highlighted{border-color:var(--accent);background:rgba(0,229,255,0.05);}
  
  .card-type{font-family:'Space Mono',monospace;font-size:0.6rem;text-transform:uppercase;padding:0.2rem 0.5rem;border-radius:4px;margin-bottom:0.5rem;display:inline-block;}
  .type-caba{background:rgba(0,229,255,0.1);color:var(--accent);}
  .type-loc{background:rgba(167,139,250,0.1);color:var(--localidad);}

  .fab-location{position:absolute;bottom:2rem;right:400px;z-index:1001;background:var(--accent);color:var(--bg);width:56px;height:56px;border-radius:18px;display:flex;justify-content:center;align-items:center;box-shadow:0 8px 24px rgba(0,229,255,0.3);cursor:pointer;border:none;}

  @media(max-width:900px){
    .sidebar{width:100%;height:45%;position:absolute;bottom:0;}
    .fab-location{right:1.5rem;bottom:calc(45% + 1.5rem);}
  }
</style>
</head>
<body>

<header>
  <div class="logo">⚡ WIFI CABA+</div>
  <div id="total-status" class="stats">Cargando...</div>
</header>

<div class="main-container">
  <div id="map"></div>
  <button class="fab-location" onclick="locateUser()">📍</button>

  <div class="sidebar">
    <div class="search-area">
      <input type="text" id="search-input" placeholder="Buscar lugar o dirección..." oninput="filterPoints()" style="width:100%; padding:12px; border-radius:12px; border:1px solid var(--border); background:var(--card); color:white; margin-bottom:10px;">
      <div class="filters-container" id="barrio-filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">Todos</button>
        <button class="filter-btn" onclick="setFilter('caba', this)">CABA</button>
      </div>
    </div>
    <div class="results-list" id="results-list"></div>
  </div>
</div>

<script>
// CONFIGURACIÓN VINCULADA A TU PLANILLA
const SHEET_ID = '166tvCHQrFrRDaohQ1Sh0Sf5uGLCueM7rnVeNtFQEDEc';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

const CABA_DATA = [
  {nombre:"Plaza de Mayo", direccion:"Monserrat", lat:-34.6083, lng:-58.3721, source:"caba"},
  {nombre:"Plaza Italia", direccion:"Palermo", lat:-34.5813, lng:-58.4211, source:"caba"},
  {nombre:"Plaza Congreso", direccion:"Congreso", lat:-34.6097, lng:-58.3924, source:"caba"}
];

let map, allPoints = [], activeFilter = 'all', activeCard = null;

async function loadSheet() {
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(47, text.length - 2));
    const cols = json.table.cols.map(c => c.label ? c.label.toLowerCase().trim() : '');
    return json.table.rows.map(row => {
      let obj = {};
      row.c.forEach((cell, i) => { if(cols[i]) obj[cols[i]] = cell ? cell.v : null; });
      return obj;
    });
  } catch(e) { 
    console.error("Error cargando Excel:", e);
    return []; 
  }
}

function setFilter(val, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = val.toLowerCase();
  filterPoints();
}

function filterPoints() {
  const query = document.getElementById('search-input').value.toLowerCase();
  const list = document.getElementById('results-list');
  list.innerHTML = '';
  map.eachLayer(l => { if(l instanceof L.CircleMarker) map.removeLayer(l); });

  const filtered = allPoints.filter(p => {
    const matchSearch = p.nombre.toLowerCase().includes(query) || (p.localidad && p.localidad.toLowerCase().includes(query));
    const matchFilter = (activeFilter === 'all') || (p.source === activeFilter);
    return matchSearch && matchFilter;
  });

  filtered.forEach(p => {
    const color = p.source === 'caba' ? '#00e5ff' : '#a78bfa';
    const marker = L.circleMarker([p.lat, p.lng], {
      radius: 9, fillColor: color, color: '#fff', weight: 2, fillOpacity: 0.8
    }).addTo(map);

    marker.bindPopup(`<b>${p.nombre}</b><br>${p.direccion || ''}`);

    const card = document.createElement('div');
    card.className = `card ${activeCard === p._idx ? 'highlighted' : ''}`;
    card.id = `card-${p._idx}`;
    card.innerHTML = `
      <span class="card-type ${p.source==='caba'?'type-caba':'type-loc'}">${p.source==='caba'?'CABA':(p.localidad || 'Provincia')}</span>
      <div class="card-name">${p.nombre}</div>
      <div class="card-addr">📍 ${p.direccion || 'Ver en mapa'}</div>
    `;
    card.onclick = () => {
      map.flyTo([p.lat, p.lng], 16);
      marker.openPopup();
      activeCard = p._idx;
      filterPoints();
    };
    list.appendChild(card);
  });
}

function locateUser() {
  map.locate({setView: true, maxZoom: 15});
}

(async() => {
  map = L.map('map', {zoomControl:false}).setView([-34.61, -58.43], 12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

  const caba = CABA_DATA.map((p, i) => ({...p, _idx: i}));
  const sheet = await loadSheet();
  
  const conurbano = sheet.map((p, i) => ({
    ...p, 
    source: p.localidad ? p.localidad.toLowerCase().trim() : 'otros',
    _idx: caba.length + i
  }));

  allPoints = [...caba, ...conurbano];
  document.getElementById('total-status').innerText = `${allPoints.length} Puntos Conectados`;

  // Generar botones de Localidad desde el Excel
  const filterContainer = document.getElementById('barrio-filters');
  const locs = [...new Set(sheet.map(p => p.localidad))].filter(Boolean).sort();
  locs.forEach(loc => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn loc-btn';
    btn.innerText = loc;
    btn.onclick = () => setFilter(loc, btn);
    filterContainer.appendChild(btn);
  });

  filterPoints();
})();
</script>
</body>
</html>
