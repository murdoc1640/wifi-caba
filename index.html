<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFi Libre · Buenos Aires</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg:#0a0e1a; --surface:#111827; --card:#1a2235; --border:#243050;
    --accent:#00e5ff; --accent2:#7c3aed; --text:#e2e8f0; --muted:#64748b;
    --success:#10b981; --caba:#00e5ff; --conurbano:#a78bfa;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px;z-index:100;flex-shrink:0;}
  .logo{display:flex;align-items:center;gap:10px;}
  .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .logo-text{font-size:18px;font-weight:800;letter-spacing:-0.5px;}
  .logo-text span{color:var(--accent);}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .count-badge{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-family:'Space Mono',monospace;font-size:12px;color:var(--accent);}
  .locate-btn{background:linear-gradient(135deg,var(--accent2),#5b21b6);border:none;border-radius:8px;color:white;padding:8px 14px;font-family:'Syne',sans-serif;font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity 0.2s;white-space:nowrap;}
  .locate-btn:hover{opacity:0.85;}
  .legend{display:flex;align-items:center;gap:12px;font-size:11px;font-family:'Space Mono',monospace;}
  .legend-item{display:flex;align-items:center;gap:5px;}
  .legend-dot{width:10px;height:10px;border-radius:50%;}
  .main{display:flex;flex:1;overflow:hidden;}
  .sidebar{width:320px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .search-area{padding:14px;border-bottom:1px solid var(--border);}
  .search-box{position:relative;}
  .search-box input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px 10px 36px;font-family:'Syne',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
  .search-box input:focus{border-color:var(--accent);}
  .search-box input::placeholder{color:var(--muted);}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;}
  .filter-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
  .filter-btn{background:var(--card);border:1px solid var(--border);border-radius:16px;color:var(--muted);padding:4px 10px;font-family:'Syne',sans-serif;font-size:12px;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
  .filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,0.07);}
  .filter-btn.conurbano-btn.active{border-color:var(--conurbano);color:var(--conurbano);background:rgba(167,139,250,0.07);}
  .list-header{padding:10px 14px 6px;font-size:11px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .wifi-list{flex:1;overflow-y:auto;padding:8px;}
  .wifi-list::-webkit-scrollbar{width:4px;}
  .wifi-list::-webkit-scrollbar-track{background:transparent;}
  .wifi-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .wifi-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:6px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;}
  .wifi-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0;transition:opacity 0.15s;}
  .wifi-card.conurbano::before{background:var(--conurbano);}
  .wifi-card:hover{border-color:rgba(0,229,255,0.4);}
  .wifi-card.conurbano:hover{border-color:rgba(167,139,250,0.4);}
  .wifi-card:hover::before,.wifi-card.highlighted::before{opacity:1;}
  .wifi-card.highlighted{border-color:var(--accent);background:rgba(0,229,255,0.05);}
  .wifi-card.conurbano.highlighted{border-color:var(--conurbano);background:rgba(167,139,250,0.05);}
  .card-top{display:flex;align-items:flex-start;gap:10px;}
  .wifi-icon{width:32px;height:32px;background:rgba(0,229,255,0.1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .wifi-icon.conurbano{background:rgba(167,139,250,0.1);}
  .card-info{flex:1;min-width:0;}
  .card-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card-address{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card-dist{font-family:'Space Mono',monospace;font-size:10px;color:var(--accent);background:rgba(0,229,255,0.1);border-radius:4px;padding:2px 6px;white-space:nowrap;flex-shrink:0;}
  .card-tags{margin-top:7px;display:flex;gap:4px;flex-wrap:wrap;}
  .tag-barrio{font-size:10px;background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.3);border-radius:4px;color:#a78bfa;padding:1px 7px;}
  .tag-tipo{font-size:10px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:4px;color:#34d399;padding:1px 7px;}
  .tag-conurbano{font-size:10px;background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.4);border-radius:4px;color:var(--conurbano);padding:1px 7px;}
  .no-results{text-align:center;color:var(--muted);font-size:13px;padding:40px 20px;}
  .loading-sheet{text-align:center;padding:10px;font-size:11px;font-family:'Space Mono',monospace;color:var(--muted);border-bottom:1px solid var(--border);}
  #map{flex:1;background:var(--bg);}
  .leaflet-popup-content-wrapper{background:var(--card)!important;border:1px solid var(--border)!important;border-radius:10px!important;color:var(--text)!important;box-shadow:0 8px 32px rgba(0,0,0,0.5)!important;}
  .leaflet-popup-tip{background:var(--card)!important;}
  .popup-name{font-weight:700;font-size:14px;margin-bottom:4px;}
  .popup-addr{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .popup-tag{display:inline-block;font-size:10px;background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.3);color:var(--accent);border-radius:4px;padding:2px 8px;font-family:'Space Mono',monospace;margin-right:4px;}
  .status-bar{background:var(--surface);border-top:1px solid var(--border);padding:6px 16px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .status-dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  @media(max-width:640px){
    .sidebar{width:100%;height:38vh;}
    .main{flex-direction:column-reverse;}
    #map{height:62vh;flex:none;}
    .logo-text{font-size:15px;}
    .legend{display:none;}
  }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">📡</div>
    <div class="logo-text">WiFi<span>Libre</span> BA</div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--caba)"></div><span style="color:var(--muted)">CABA</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--conurbano)"></div><span style="color:var(--muted)">Conurbano</span></div>
  </div>
  <div class="header-right">
    <div class="count-badge" id="total-count">— puntos</div>
    <button class="locate-btn" onclick="locateUser()">📍 Ubicarme</button>
  </div>
</header>
<div class="main">
  <div class="sidebar">
    <div class="search-area">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Buscar barrio, dirección, tipo..." oninput="filterPoints()">
      </div>
      <div class="filter-row" id="barrio-filters"></div>
    </div>
    <div id="loading-sheet" class="loading-sheet">⏳ Cargando puntos del conurbano…</div>
    <div class="list-header">
      <span>PUNTOS DE ACCESO</span>
      <span id="list-count" style="color:var(--accent)">—</span>
    </div>
    <div class="wifi-list" id="wifi-list"></div>
  </div>
  <div id="map"></div>
</div>
<div class="status-bar">
  <div class="status-dot"></div>
  <span id="status-text">Cargando…</span>
</div>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-ahKhuIGHf_Fdednvqihnw2v7JnFrLEBRViMPmAyn-g82iiwV0yq1rVBXAu0k9Qc8rn8H6Kml2VXz/pub?output=csv";

function makeIcon(color='#00e5ff'){
  return L.divIcon({
    html:`<div style="width:10px;height:10px;background:${color};border:2px solid rgba(255,255,255,0.25);border-radius:50%;box-shadow:0 0 6px ${color}88;"></div>`,
    className:'',iconSize:[10,10],iconAnchor:[5,5]
  });
}
function makeUserIcon(){
  return L.divIcon({
    html:`<div style="width:16px;height:16px;background:#f59e0b;border:3px solid white;border-radius:50%;box-shadow:0 0 12px #f59e0baa;"></div>`,
    className:'',iconSize:[16,16],iconAnchor:[8,8]
  });
}

let allPoints=[], markers=[], userMarker=null, userLatLng=null, activeCard=null, currentFilter='';

function haversineKm(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function formatDist(km){return km<1?Math.round(km*1000)+' m':km.toFixed(1)+' km';}

// ── PARSE CSV ──
function parseCSV(text){
  const lines = text.trim().split('\n');
  if(lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/['"]/g,''));
  const results = [];
  for(let i=1;i<lines.length;i++){
    const cols = lines[i].split(',').map(c=>c.trim().replace(/^"|"$/g,''));
    const row = {};
    headers.forEach((h,j) => row[h] = cols[j]||'');
    // Solo incluir si aprobado = "si"
    const aprobado = (row['aprobado']||'').toLowerCase().trim();
    if(aprobado !== 'si') continue;
    const lat = parseFloat(row['latitud']||row['lat']||'');
    const lng = parseFloat(row['longitud']||row['long']||row['lng']||'');
    if(isNaN(lat)||isNaN(lng)) continue;
    results.push({
      name: row['nombre del lugar']||row['nombre']||'Punto WiFi',
      address: row['dirección']||row['direccion']||row['address']||'',
      barrio: row['barrio / localidad']||row['barrio']||row['localidad']||'',
      tipo: row['tipo de lugar']||row['tipo']||'',
      lat, lng,
      source: 'conurbano'
    });
  }
  return results;
}

// ── LOAD SHEET ──
async function loadSheet(){
  try{
    const r = await fetch(SHEET_URL);
    const text = await r.text();
    const points = parseCSV(text);
    document.getElementById('loading-sheet').style.display='none';
    return points;
  } catch(e){
    document.getElementById('loading-sheet').textContent = '⚠️ No se pudieron cargar puntos del conurbano';
    return [];
  }
}

// ── FILTER ──
function filterPoints(){
  const q = document.getElementById('search-input').value.toLowerCase();
  let results = allPoints;
  if(q) results = allPoints.filter(p=>
    (p.name||'').toLowerCase().includes(q)||
    (p.address||'').toLowerCase().includes(q)||
    (p.barrio||'').toLowerCase().includes(q)||
    (p.tipo||'').toLowerCase().includes(q)
  );
  if(currentFilter==='conurbano') results = results.filter(p=>p.source==='conurbano');
  else if(currentFilter) results = results.filter(p=>(p.barrio||'').toLowerCase()===currentFilter);
  renderList(results);
  updateMarkers(results);
}

function setFilter(val){
  currentFilter = currentFilter===val ? '' : val;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active', b.dataset.filter===currentFilter));
  filterPoints();
}

function renderFilters(){
  const counts={};
  allPoints.filter(p=>p.source!=='conurbano').forEach(p=>{if(p.barrio) counts[p.barrio]=(counts[p.barrio]||0)+1;});
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5).map(e=>e[0]);
  const conurbanoCount = allPoints.filter(p=>p.source==='conurbano').length;
  let html = top.map(b=>`<button class="filter-btn" data-filter="${b.toLowerCase()}" onclick="setFilter('${b.toLowerCase()}')">${b}</button>`).join('');
  if(conurbanoCount>0) html += `<button class="filter-btn conurbano-btn" data-filter="conurbano" onclick="setFilter('conurbano')">🟣 Conurbano (${conurbanoCount})</button>`;
  document.getElementById('barrio-filters').innerHTML = html;
}

function renderList(points){
  document.getElementById('list-count').textContent = points.length;
  let sorted=[...points];
  if(userLatLng){
    sorted.forEach(p=>p._dist=haversineKm(userLatLng.lat,userLatLng.lng,p.lat,p.lng));
    sorted.sort((a,b)=>a._dist-b._dist);
  }
  if(!sorted.length){
    document.getElementById('wifi-list').innerHTML='<div class="no-results">😕 No se encontraron puntos</div>';
    return;
  }
  const isConurbano = p=>p.source==='conurbano';
  document.getElementById('wifi-list').innerHTML = sorted.map(p=>`
    <div class="wifi-card ${isConurbano(p)?'conurbano':''}" onclick="focusPoint(${p._idx})" id="card-${p._idx}">
      <div class="card-top">
        <div class="wifi-icon ${isConurbano(p)?'conurbano':''}">📶</div>
        <div class="card-info">
          <div class="card-name">${p.name}</div>
          <div class="card-address">${p.address||'—'}</div>
        </div>
        ${p._dist!==undefined?`<div class="card-dist">${formatDist(p._dist)}</div>`:''}
      </div>
      <div class="card-tags">
        ${p.barrio?`<span class="${isConurbano(p)?'tag-conurbano':'tag-barrio'}">${p.barrio}</span>`:''}
        ${p.tipo&&p.tipo!=='nan'?`<span class="tag-tipo">${p.tipo}</span>`:''}
        ${isConurbano(p)?'<span class="tag-conurbano">Conurbano</span>':''}
      </div>
    </div>
  `).join('');
}

function updateMarkers(points){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
  const shown=new Set(points.map(p=>p._idx));
  allPoints.forEach(p=>{
    if(!shown.has(p._idx)) return;
    const color = p.source==='conurbano' ? '#a78bfa' : '#00e5ff';
    const m = L.marker([p.lat,p.lng],{icon:makeIcon(color)}).addTo(map)
      .bindPopup(`
        <div class="popup-name">${p.name}</div>
        <div class="popup-addr">${p.address||''}</div>
        <div>
          ${p.barrio?`<span class="popup-tag" style="${p.source==='conurbano'?'color:#a78bfa;border-color:#a78bfa44':''}'">${p.barrio}</span>`:''}
          ${p.tipo&&p.tipo!=='nan'?`<span class="popup-tag" style="color:#34d399;border-color:#34d39944;background:rgba(16,185,129,0.08)">${p.tipo}</span>`:''}
          ${p._dist!==undefined?`<span class="popup-tag" style="color:#f59e0b;border-color:#f59e0b44;background:rgba(245,158,11,0.08)">${formatDist(p._dist)}</span>`:''}
        </div>
      `);
    m.on('click',()=>highlightCard(p._idx));
    m._wifiIdx=p._idx;
    markers.push(m);
  });
}

function focusPoint(idx){
  const p=allPoints[idx]; if(!p) return;
  map.flyTo([p.lat,p.lng],17,{animate:true,duration:0.8});
  markers.find(m=>m._wifiIdx===idx)?.openPopup();
  highlightCard(idx);
}

function highlightCard(idx){
  if(activeCard!==null) document.getElementById(`card-${activeCard}`)?.classList.remove('highlighted');
  activeCard=idx;
  const el=document.getElementById(`card-${idx}`);
  if(el){el.classList.add('highlighted');el.scrollIntoView({block:'nearest',behavior:'smooth'});}
}

function locateUser(){
  if(!navigator.geolocation){alert('Tu navegador no soporta geolocalización');return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    userLatLng={lat:pos.coords.latitude,lng:pos.coords.longitude};
    if(userMarker) map.removeLayer(userMarker);
    userMarker=L.marker([userLatLng.lat,userLatLng.lng],{icon:makeUserIcon()})
      .addTo(map).bindPopup('<div class="popup-name">📍 Tu ubicación</div>').openPopup();
    map.flyTo([userLatLng.lat,userLatLng.lng],13,{animate:true,duration:1});
    allPoints.forEach(p=>p._dist=haversineKm(userLatLng.lat,userLatLng.lng,p.lat,p.lng));
    filterPoints();
  },()=>alert('No se pudo obtener tu ubicación.'));
}

  document.getElementById('total-count').textContent = total+' puntos';
  document.getElementById('status-text').textContent =
    `897 CABA (GCBA) + ${extra} Conurbano (comunidad) · Total: ${total}`;
  renderFilters();
  renderList(allPoints);
  updateMarkers(allPoints);
})();
</script>
